<div class="page">
  <div class="card">
    <h1>Gerar receita</h1>
    <p class="subtitle">Descreva os ingredientes ou o prato que você quer.</p>

    <textarea
      rows="5"
      [(ngModel)]="description"
      placeholder="Ex: Strogonoff de frango com arroz..."
    ></textarea>

    <button (click)="gerar()" [disabled]="!canSubmit">
      {{ loading ? 'Gerando receita...' : 'Gerar receita' }}
    </button>

    <div *ngIf="error" class="feedback error">{{ error }}</div>

    <section *ngIf="generatedRecipe as recipe" class="result">
      <h2>{{ recipe.title }}</h2>
      <p class="meta">
        <span>{{ recipe.portions }}</span>
        <span>{{ recipe.preparationTime }}</span>
      </p>

      <div class="columns">
        <div class="column">
          <h3>Ingredientes</h3>
          <ul>
            <li *ngFor="let item of recipe.ingredients">{{ item }}</li>
          </ul>
        </div>

        <div class="column">
          <h3>Preparo</h3>
          <ol>
            <li *ngFor="let step of recipe.steps">{{ step }}</li>
          </ol>
        </div>
      </div>

      <button (click)="startRecipe()">Iniciar receita</button>
    </section>
  </div>
</div>
